version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0-alpine
    container_name: realtime-feed-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: realtime-feed
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - realtime-feed-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    command: mongod --wantMajorVersionUpgrade

  # Redis Service
  redis:
    image: redis:7.0-alpine
    container_name: realtime-feed-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - realtime-feed-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # MongoDB Express (Optional - Web UI for MongoDB)
  mongo-express:
    image: mongo-express:latest
    container_name: realtime-feed-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - realtime-feed-network
    healthcheck:
      test: wget --quiet --tries=3 --spider http://localhost:8081 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  realtime-feed-network:
    driver: bridge
